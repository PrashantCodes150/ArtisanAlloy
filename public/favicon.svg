<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4d03f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5a028;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1a1a2e" stroke="url(#goldGradient)" stroke-width="2"/>
  
  <!-- Letter F -->
  <text x="50" y="68" 
        font-family="Cormorant Garamond, Georgia, serif" 
        font-size="60" 
        font-weight="700" 
        fill="url(#goldGradient)" 
        text-anchor="middle"
        filter="url(#glow)">F</text>
  
  <!-- Small diamond accent -->
  <polygon points="50,18 53,22 50,26 47,22" fill="url(#goldGradient)" opacity="0.8"/>
</svg>
